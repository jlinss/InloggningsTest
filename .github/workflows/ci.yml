on:
  push:
    branches: ["main"]



jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'


      - name: Build with maven
        run: mvn -B package --fie pom. xml

      - name: Run tests
        run: mvn test